<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPLIDAR 高级示例 - 多雷达显示</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        
        h1 {
            text-align: center;
            color: #333;
        }
        
        .radar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .radar-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .radar-card h2 {
            margin: 0 0 15px 0;
            color: #667eea;
            font-size: 18px;
        }
        
        .controls {
            margin: 20px auto;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        .slider-group {
            margin: 15px 0;
        }
        
        .slider-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        
        input[type="range"] {
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>🎯 RPLIDAR 高级示例 - 可定制配置</h1>
    
    <div class="controls">
        <h3>控制面板</h3>
        
        <div class="slider-group">
            <label>数据点大小: <span id="point-size-value">2.5</span></label>
            <input type="range" id="point-size" min="1" max="5" step="0.5" value="2.5">
        </div>
        
        <div class="slider-group">
            <label>最大距离: <span id="max-distance-value">12</span>米</label>
            <input type="range" id="max-distance" min="3" max="12" step="1" value="12">
        </div>
        
        <div>
            <button onclick="changeColor('#ff0000')">🔴 红色</button>
            <button onclick="changeColor('#00ff00')">🟢 绿色</button>
            <button onclick="changeColor('#0000ff')">🔵 蓝色</button>
            <button onclick="changeColor('#ff00ff')">🟣 紫色</button>
        </div>
    </div>
    
    <div class="radar-grid">
        <!-- 雷达1：完整版 -->
        <div class="radar-card">
            <h2>标准雷达（12米）</h2>
            <div id="radar-1"></div>
        </div>
        
        <!-- 雷达2：简化版 -->
        <div class="radar-card">
            <h2>小尺寸雷达（6米）</h2>
            <div id="radar-2"></div>
        </div>
    </div>

    <!-- 引入Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <!-- 引入RPLidar模块 -->
    <script src="/static/rplidar-widget.js"></script>
    
    <script>
        // 创建雷达1 - 标准配置
        const radar1 = new RPLidarWidget('radar-1', {
            maxDistance: 12,
            width: 500,
            height: 500,
            showStats: true,
            title: '主雷达',
            pointColor: 'rgba(255, 0, 0, 0.7)',
            pointSize: 2.5
        });
        
        // 创建雷达2 - 小尺寸
        const radar2 = new RPLidarWidget('radar-2', {
            maxDistance: 6,
            width: 400,
            height: 400,
            showStats: false,
            title: '辅助雷达',
            pointColor: 'rgba(0, 255, 0, 0.7)',
            pointSize: 3
        });
        
        // 动态调整数据点大小
        document.getElementById('point-size').addEventListener('input', function(e) {
            const size = parseFloat(e.target.value);
            document.getElementById('point-size-value').textContent = size;
            radar1.updateOptions({ pointSize: size });
            radar2.updateOptions({ pointSize: size });
        });
        
        // 动态调整最大距离
        document.getElementById('max-distance').addEventListener('input', function(e) {
            const dist = parseInt(e.target.value);
            document.getElementById('max-distance-value').textContent = dist;
            radar1.updateOptions({ maxDistance: dist });
        });
        
        // 改变颜色
        function changeColor(color) {
            const rgba = hexToRgba(color, 0.7);
            radar1.updateOptions({ pointColor: rgba });
            radar2.updateOptions({ pointColor: rgba });
        }
        
        // 颜色转换辅助函数
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }
        
        console.log('高级示例已加载');
        console.log('雷达1:', radar1);
        console.log('雷达2:', radar2);
    </script>
</body>
</html>
